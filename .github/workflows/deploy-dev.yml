name: Deploy to Development

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AWS_REGION: eu-west-1
  ENVIRONMENT: dev

jobs:
  # ============================================================================
  # Test and Build
  # ============================================================================
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install all dependencies
      run: |
        npm ci
        cd backend && npm ci && cd ..
        cd infra && npm ci && cd ..

    - name: Run tests
      run: npm test
      continue-on-error: true

    - name: Build all
      run: |
        cd backend && npm run build && cd ..
        cd infra && npm run build && cd ..
        npm run build

  # ============================================================================
  # Deploy Infrastructure
  # ============================================================================
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: test-and-build
    environment: development
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: infra/package-lock.json

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install dependencies
      working-directory: ./infra
      run: npm ci

    - name: Build infrastructure
      working-directory: ./infra
      run: npm run build

    - name: Bootstrap CDK
      working-directory: ./infra
      run: npx cdk bootstrap

    - name: Deploy infrastructure
      working-directory: ./infra
      run: npx cdk deploy --require-approval never
      env:
        ENVIRONMENT: ${{ env.ENVIRONMENT }}
        CORS_ORIGIN: ${{ vars.DEV_CORS_ORIGIN }}
        OAUTH_CALLBACK_URLS: ${{ vars.DEV_OAUTH_CALLBACK_URLS }}
        OAUTH_LOGOUT_URLS: ${{ vars.DEV_OAUTH_LOGOUT_URLS }}

    - name: Save infrastructure outputs
      working-directory: ./infra
      run: |
        echo "# Infrastructure Outputs - $(date)" > ../infra-outputs.txt
        npx cdk describe-stack-output EcoSquadStack >> ../infra-outputs.txt || true
        cat ../infra-outputs.txt

    - name: Upload outputs
      uses: actions/upload-artifact@v4
      with:
        name: infra-outputs-dev
        path: infra-outputs.txt

  # ============================================================================
  # Deploy Frontend
  # ============================================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: development
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build
      env:
        NEXT_PUBLIC_APP_URL: ${{ vars.DEV_APP_URL }}
        NEXT_PUBLIC_API_URL: ${{ vars.DEV_API_URL }}

    - name: Deploy to S3
      run: |
        # Get the bucket name from CloudFormation outputs
        BUCKET_NAME=$(aws cloudformation describe-stacks \
          --stack-name EcoSquadStack \
          --query 'Stacks[0].Outputs[?OutputKey==`WebsiteBucketName`].OutputValue' \
          --output text)
        
        echo "Deploying to bucket: $BUCKET_NAME"
        aws s3 sync dist/ "s3://$BUCKET_NAME" --delete

    - name: Invalidate CloudFront cache
      run: |
        # Get the distribution ID from CloudFormation outputs
        DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
          --stack-name EcoSquadStack \
          --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
          --output text)
        
        echo "Invalidating distribution: $DISTRIBUTION_ID"
        aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/*"

    - name: Deployment Summary
      run: |
        echo "✅ Development deployment completed!"
        echo ""
        echo "🌐 Website URL: ${{ vars.DEV_APP_URL }}"
        echo "🔌 API URL: ${{ vars.DEV_API_URL }}"
