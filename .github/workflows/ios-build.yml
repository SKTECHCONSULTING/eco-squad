name: iOS Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'mobile/ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/ios/**'

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
      
    - name: Show Xcode Version
      run: xcodebuild -version
      
    - name: Show Build Settings
      run: |
        cd mobile/ios
        xcodebuild -project EcoSquad.xcodeproj -scheme EcoSquad -showBuildSettings
      
    - name: Build App
      run: |
        cd mobile/ios
        xcodebuild clean build \
          -project EcoSquad.xcodeproj \
          -scheme EcoSquad \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO
      
    - name: Run Tests
      run: |
        cd mobile/ios
        xcodebuild test \
          -project EcoSquad.xcodeproj \
          -scheme EcoSquad \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO
      continue-on-error: true # Tests may not exist yet
      
    - name: Archive App (Release)
      if: github.ref == 'refs/heads/main'
      run: |
        cd mobile/ios
        xcodebuild archive \
          -project EcoSquad.xcodeproj \
          -scheme EcoSquad \
          -archivePath build/EcoSquad.xcarchive \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO
      
    - name: Upload Archive
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: EcoSquad-iOS-Archive
        path: mobile/ios/build/EcoSquad.xcarchive
        retention-days: 30

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Run SwiftLint
      uses: norio-nomura/action-swiftlint@3.2.1
      with:
        args: --path mobile/ios --reporter github-actions-logging
      continue-on-error: true
