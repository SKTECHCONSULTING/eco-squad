version: '3.8'

services:
  # ==========================================================================
  # DynamoDB Local - For local development
  # ==========================================================================
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: eco-squad-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - dynamodb-data:/data
    networks:
      - eco-squad-network

  # ==========================================================================
  # LocalStack - For S3 and other AWS services locally
  # ==========================================================================
  localstack:
    image: localstack/localstack:latest
    container_name: eco-squad-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVICES=s3,cognito-idp
      - DEFAULT_REGION=eu-west-1
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - eco-squad-network

  # ==========================================================================
  # Frontend Application (Next.js)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: eco-squad-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - AWS_REGION=eu-west-1
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - S3_LOCAL_ENDPOINT=http://localstack:4566
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - dynamodb-local
      - localstack
    networks:
      - eco-squad-network
    command: npm run dev

  # ==========================================================================
  # Backend/API (Optional - for running Lambda functions locally)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: eco-squad-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - AWS_REGION=eu-west-1
      - TABLE_NAME=EcoSquadTable
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - S3_LOCAL_ENDPOINT=http://localstack:4566
      - BUCKET_NAME=eco-squad-evidence-local
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - dynamodb-local
      - localstack
    networks:
      - eco-squad-network
    profiles:
      - backend  # Only start when explicitly requested

  # ==========================================================================
  # DynamoDB Admin UI - Web interface for DynamoDB
  # ==========================================================================
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: eco-squad-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=eu-west-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local
    networks:
      - eco-squad-network

networks:
  eco-squad-network:
    driver: bridge

volumes:
  dynamodb-data:
  localstack-data:
